name: Sync Fixtures

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron-sync endpoint
        run: |
          curl -sf -X GET "https://worldengecup-2026v5.vercel.app/api/cron-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
